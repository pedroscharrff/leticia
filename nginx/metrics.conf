# =============================================================================
#  nginx vhost — https://metrics.arkossales.com → Prometheus
#
#  Protegido por basic auth. O arquivo /etc/nginx/htpasswd é gerado pelo
#  deploy.sh em `setup_metrics_auth()` (ou manualmente via:
#    htpasswd -c nginx/htpasswd admin
#  ).
#
#  Certificado SSL: emitido junto com api/admin/storage no deploy.sh
#  (Let's Encrypt SAN cobrindo metrics.${DOMAIN}).
#
#  Em dev local (sem deploy.sh) este arquivo é carregado mas só funciona
#  se você criar htpasswd e cert manualmente — caso contrário, nginx loga
#  warning e ignora o server block (open_file_cache + try_files=404).
# =============================================================================

server {
    listen 443 ssl http2;
    server_name metrics.arkossales.com;

    # Certificado SAN compartilhado (mesmo emitido p/ api.arkossales.com).
    # Se metrics.* não estiver no cert ainda, o handshake falha — re-emita
    # com `deploy.sh` após `metrics.*` ter sido adicionado à lista de SANs.
    ssl_certificate     /etc/letsencrypt/live/api.arkossales.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.arkossales.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "no-referrer"                                   always;

    # Basic auth — única barreira pra UI/API do Prometheus.
    # Trocar senha: `htpasswd -B nginx/htpasswd admin` no host e recarregar nginx.
    auth_basic           "Metrics — restricted";
    auth_basic_user_file /etc/nginx/htpasswd;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_prom prometheus:9090;
        proxy_pass            http://$upstream_prom;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }
}

# HTTP → HTTPS redirect (+ permite ACME challenge)
server {
    listen 80;
    server_name metrics.arkossales.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
