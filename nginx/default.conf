# =============================================================================
#  ATENÇÃO: Este arquivo é gerado automaticamente pelo deploy.sh
#  NÃO edite manualmente — suas alterações serão sobrescritas.
#  Para customizar, edite a função write_nginx_https() no deploy.sh
# =============================================================================
#
# Em desenvolvimento local (sem deploy.sh), use esta configuração básica:

limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # Docker's internal DNS — re-resolve service names every 10s so nginx
    # picks up the new container IP after a `docker compose up --no-deps`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /webhook/ {
        limit_req zone=webhook burst=10 nodelay;
        set $upstream_api api:8000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ ^/(health|docs|redoc|openapi\.json|auth|admin|metrics|portal) {
        set $upstream_api api:8000;
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream_admin admin:80;
        proxy_pass         http://$upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
