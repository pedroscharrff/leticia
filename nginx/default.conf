limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Webhook endpoint ──────────────────────────────────────────────────────
    location /webhook/ {
        limit_req zone=webhook_limit burst=10 nodelay;

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Internal / admin endpoints (restrict to known IPs in prod) ───────────
    location /admin/ {
        # allow 10.0.0.0/8;   # VPN / internal network
        # deny all;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Metrics / API docs / health ───────────────────────────────────────────
    location ~ ^/(metrics|docs|redoc|health) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
