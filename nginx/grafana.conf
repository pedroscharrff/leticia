# PLACEHOLDER local — em prod o update.sh sobrescreve este arquivo
# com o vhost real (https://grafana.${DOMAIN}) e cert SSL emitido.
#
# Em dev local sem deploy.sh este server block fica inativo (sem cert ele
# só serve handshake falho — não afeta os outros vhosts).

server {
    listen 80;
    server_name grafana.localhost;
    location / { return 200 "Configure grafana subdomain via update.sh\n"; }
}
