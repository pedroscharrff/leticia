server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — all unknown paths served from index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API routes to the FastAPI container
  location ~ ^/(auth|admin|webhook|health|metrics)/ {
    proxy_pass         http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Security headers
  add_header X-Frame-Options       DENY        always;
  add_header X-Content-Type-Options nosniff    always;
  add_header Referrer-Policy       strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1024;
}
