# Datasource provisioning — apontado para o Prometheus na rede interna do compose.
# Sem auth porque ambos estão na mesma docker network (basic auth fica no nginx).
apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
