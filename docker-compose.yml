version: "3.9"

# Variáveis compartilhadas entre api e workers
x-api-env: &api-env
  # App vai via PgBouncer (transaction mode, ~25 conexões reais multiplexadas
  # entre todos os workers). Postgres direto (`postgres:5432`) continua
  # acessível via DATABASE_URL_DIRECT — usado por scripts/run_migrations.py
  # (DDL não pode passar por transaction pooling) e por qualquer task admin.
  DATABASE_URL:                postgresql://farmacia:${DB_PASSWORD}@pgbouncer:5432/saas_farmacia
  DATABASE_URL_DIRECT:         postgresql://farmacia:${DB_PASSWORD}@postgres:5432/saas_farmacia
  REDIS_URL:                   redis://redis:6379/0
  RABBITMQ_URL:                amqp://farmacia:${RABBITMQ_PASS}@rabbitmq:5672/
  ANTHROPIC_API_KEY:           ${ANTHROPIC_API_KEY}
  GOOGLE_API_KEY:              ${GOOGLE_API_KEY:-}
  OPENAI_API_KEY:              ${OPENAI_API_KEY:-}
  GROQ_API_KEY:                ${GROQ_API_KEY:-}
  MEDIA_TRANSCRIPTION_PROVIDER: ${MEDIA_TRANSCRIPTION_PROVIDER:-groq}
  MEDIA_TRANSCRIPTION_MODEL:   ${MEDIA_TRANSCRIPTION_MODEL:-whisper-large-v3}
  MEDIA_VISION_PROVIDER:       ${MEDIA_VISION_PROVIDER:-anthropic}
  MEDIA_VISION_MODEL:          ${MEDIA_VISION_MODEL:-claude-sonnet-4-6}
  SECRET_KEY:                  ${SECRET_KEY}
  ENVIRONMENT:                 ${ENVIRONMENT:-production}
  LOG_LEVEL:                   ${LOG_LEVEL:-INFO}
  ADMIN_EMAIL:                 ${ADMIN_EMAIL}
  ADMIN_PASSWORD_HASH:         ${ADMIN_PASSWORD_HASH}
  CORS_ORIGINS:                ${CORS_ORIGINS}
  # URL pública do backend — usada pra montar a URL exibida na tela de
  # integrações do portal (broker). Se ausente, cai no default
  # `http://localhost:8000` do pydantic-settings e o tenant copia URL errada
  # pro painel do provider. Veja `api/routers/broker.py::_build_ingest_url`.
  PUBLIC_API_URL:              ${PUBLIC_API_URL:-http://localhost:8000}
  SESSION_TTL_SECONDS:         ${SESSION_TTL_SECONDS:-1800}
  MAX_CONTEXT_MESSAGES:        ${MAX_CONTEXT_MESSAGES:-10}
  ANALYST_MAX_RETRIES:         ${ANALYST_MAX_RETRIES:-1}
  LLM_TIMEOUT_SECONDS:         ${LLM_TIMEOUT_SECONDS:-30}
  CELERY_WORKERS_CONCURRENCY:  ${CELERY_WORKERS_CONCURRENCY:-16}
  MINIO_ENDPOINT:              ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY:            ${MINIO_ACCESS_KEY:-farmacia}
  MINIO_SECRET_KEY:            ${MINIO_SECRET_KEY}
  MINIO_BUCKET:                ${MINIO_BUCKET:-offers-media}
  MINIO_SECURE:                ${MINIO_SECURE:-false}
  MINIO_PUBLIC_URL:            ${MINIO_PUBLIC_URL:-http://localhost:9000}
  # ── Tenant secrets encryption (Fernet) ──────────────────────────────────────
  ENCRYPTION_KEY:              ${ENCRYPTION_KEY}
  # ── Billing (opcionais; deixe vazios se não usar) ───────────────────────────
  STRIPE_API_KEY:              ${STRIPE_API_KEY:-}
  STRIPE_WEBHOOK_SECRET:       ${STRIPE_WEBHOOK_SECRET:-}
  ASAAS_API_KEY:               ${ASAAS_API_KEY:-}
  # ── Email transacional (Resend) ─────────────────────────────────────────────
  RESEND_API_KEY:              ${RESEND_API_KEY:-}
  # ── Self-service signup ─────────────────────────────────────────────────────
  ALLOW_SIGNUP:                ${ALLOW_SIGNUP:-false}
  DEFAULT_TRIAL_DAYS:          ${DEFAULT_TRIAL_DAYS:-7}

services:

  # ── Painel Admin (React SPA) ─────────────────────────────────────────────────
  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api
    restart: unless-stopped
    # Sem exposição de porta — acessado pelo nginx via rede interna

  # ── Reverse Proxy (SSL + roteamento) ────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/metrics.conf:/etc/nginx/conf.d/metrics.conf:ro
      - ./nginx/grafana.conf:/etc/nginx/conf.d/grafana.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro    # basic auth p/ metrics.*
      - certbot_certs:/etc/letsencrypt:ro          # certificados SSL
      - certbot_www:/var/www/certbot:ro             # webroot para ACME challenge
    depends_on:
      - api
      - admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health", "||", "true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (emissão e renovação automática SSL) ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt       # leitura/escrita dos certs
      - certbot_www:/var/www/certbot         # escrita do challenge ACME
    # Renova automaticamente a cada 12h (Let's Encrypt expira em 90 dias)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      <<: *api-env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Workers (2 réplicas = 32 conversas simultâneas) ──────────────────
  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: >
      celery -A workers.celery_app.celery_app worker
      --concurrency=${CELERY_WORKERS_CONCURRENCY:-16}
      --loglevel=${LOG_LEVEL:-info}
      --queues=celery
    expose:
      - "9100"   # métricas Prometheus (rede interna apenas)
    environment:
      <<: *api-env
      # ── Prometheus multiprocess (forks escrevem aqui, PAI serve HTTP) ──
      WORKER_METRICS_PORT:        "9100"
      PROMETHEUS_MULTIPROC_DIR:   "/tmp/prom_multiproc_celery"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "workers.celery_app.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  # Único responsável por disparar as tasks recorrentes definidas em
  # `workers/celery_app.py::beat_schedule` (recover_abandoned_carts,
  # expire_abandoned_carts, nudge_continuous_refill).
  #
  # ⚠️ NUNCA escalar para 2+ réplicas — dois beats agendariam cada task
  # em dobro. Se o container cair, a próxima janela perdida não é recuperada
  # (jobs são idempotentes — uma rodada perdida só atrasa o nudge).
  beat:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: >
      celery -A workers.celery_app.celery_app beat
      --loglevel=${LOG_LEVEL:-info}
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *api-env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── PgBouncer (transaction pooling) ─────────────────────────────────────────
  # Sentado entre os apps (api, worker) e o Postgres. Multiplexa muitas conexões
  # cliente (centenas) sobre poucas conexões de servidor (~25 reais), evitando
  # estourar `max_connections` mesmo com vários workers × concurrency alta.
  #
  # Modo `transaction`: cada transação ganha uma conexão de servidor; ao terminar,
  # a conexão volta pra pool e pode atender outro cliente. Requer no app:
  #   • asyncpg.create_pool(..., statement_cache_size=0)   ← já configurado
  #   • Nenhum LISTEN/NOTIFY, advisory lock de sessão ou SET de sessão.
  #
  # Auth: AUTH_TYPE=plain — o PgBouncer guarda a senha em texto no userlist.txt
  # gerado a partir do env (rede docker interna, não exposto externamente) e
  # negocia SCRAM com o Postgres backend. Migra pra `scram-sha-256` quando
  # houver appetite pra montar o SCRAM verifier no userlist.
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    environment:
      DB_HOST:              postgres
      DB_PORT:              "5432"
      DB_USER:              farmacia
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_NAME:              saas_farmacia
      POOL_MODE:            transaction
      AUTH_TYPE:            plain
      MAX_CLIENT_CONN:      "500"        # clientes simultâneos (asyncpg pools)
      DEFAULT_POOL_SIZE:    "25"         # conexões reais por (db,user) no Postgres
      MIN_POOL_SIZE:        "5"
      RESERVE_POOL_SIZE:    "10"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY:   "DISCARD ALL"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,search_path"
      ADMIN_USERS:          farmacia
      STATS_USERS:          farmacia
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$DB_PASSWORD psql -h 127.0.0.1 -p 5432 -U $$DB_USER -d pgbouncer -c 'SHOW POOLS;' >/dev/null 2>&1 || pg_isready -h 127.0.0.1 -p 5432"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    # max_connections=200: o PgBouncer usa até ~25 (default_pool_size) +
    # reserve_pool_size=10 + algumas adm; sobra folga para psql manual,
    # migrations e ferramentas (pg_dump, etc) sem competir com o app.
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
    environment:
      POSTGRES_DB:       saas_farmacia
      POSTGRES_USER:     farmacia
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmacia -d saas_farmacia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (object storage para mídia de ofertas) ─────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-farmacia}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # API S3 (público em prod via nginx, ver MINIO_PUBLIC_URL)
      - "127.0.0.1:9001:9001"   # Console admin (apenas localhost)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: farmacia
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}   # senha via .env (não mais "guest")
    ports:
      - "127.0.0.1:15672:15672"   # Management UI — apenas localhost (SSH tunnel)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  # Acessível externamente via nginx em https://${METRICS_DOMAIN} com basic auth.
  # Internamente o api/worker NÃO falam com o Prometheus — só o nginx (proxy)
  # e o Grafana (datasource).
  prometheus:
    image: prom/prometheus:v2.55.0
    expose:
      - "9090"   # interno: nginx + grafana
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_rules.yml:/etc/prometheus/rules/pricing.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.external-url=https://${METRICS_DOMAIN:-metrics.localhost}"
      - "--web.route-prefix=/"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:3000:3000"     # apenas localhost (SSH tunnel)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      # Domain público (servido pelo nginx em https://grafana.${DOMAIN}).
      # Fallback p/ localhost mantém SSH tunnel funcionando em dev.
      GF_SERVER_ROOT_URL:         ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  certbot_certs:    # certificados Let's Encrypt (compartilhado: nginx + certbot)
  certbot_www:      # webroot para ACME challenge   (compartilhado: nginx + certbot)
  minio_data:       # arquivos de mídia das ofertas
